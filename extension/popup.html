<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>妖怪メダルコレクション</title>
  <style>
    body {
      width: 350px;
      min-height: 400px;
      padding: 30px;
      font-family: 'Outfit', 'Roboto', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      margin: 0;
      color: #333;
      display: flex;
      flex-direction: column;
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    .header h1 {
      font-size: 1.5rem;
      margin: 0;
      color: #d32f2f;
    }
    .stats-container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      text-align: center;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .progress-circle {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: conic-gradient(#ffcc00 var(--progress, 0%), #eee 0deg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      position: relative;
    }
    .progress-circle::after {
      content: '';
      position: absolute;
      width: 130px;
      height: 130px;
      background: white;
      border-radius: 50%;
    }
    .progress-value {
      position: relative;
      z-index: 1;
      font-size: 2rem;
      font-weight: bold;
    }
    .count {
      font-size: 1.2rem;
      color: #666;
    }
    .footer {
      margin-top: 25px;
      font-size: 0.85rem;
      text-align: center;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>妖怪メダル大辞典管理</h1>
  </div>
  <div class="stats-container">
    <div class="progress-circle" id="progress-circle">
      <span class="progress-value" id="progress-text">0%</span>
    </div>
    <div class="count" id="count-text">0 / 0 メダル</div>
  </div>
  <div class="footer">
    ページ上のメダルをクリックして所持状態を記録してください。
  </div>
  <script src="popup.js"></script>
</body>
</html>
